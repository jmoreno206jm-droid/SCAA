<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Asistencia RRHH</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#E4002B">

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

:root{
--rojo:#E4002B;
--rojo-dark:#B30022;
--rojo-light:#FF4D6D;

--green:#2E7D32;
--green-dark:#1B5E20;

--yellow:#F9A825;
--yellow-dark:#F57F17;

--text:#1F2937;
--muted:#6B7280;
}

*{
box-sizing:border-box;
font-family:"Segoe UI",system-ui;
}

body{
margin:0;
height:100vh;
display:flex;
align-items:center;
justify-content:center;

background:linear-gradient(135deg,#7A0019,#E4002B,#FF4D6D);
background-size:400% 400%;
animation:fondo 10s ease infinite;
}

@keyframes fondo{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

/* CONTENEDOR */

.card{
width:100%;
max-width:400px;
padding:34px;
border-radius:28px;

background:rgba(255,255,255,0.95);
backdrop-filter:blur(10px);

text-align:center;

box-shadow:
0 25px 60px rgba(0,0,0,.35),
0 0 40px rgba(228,0,43,.25);

animation:fadeUp .6s ease;
}

@keyframes fadeUp{
from{opacity:0;transform:translateY(30px)}
to{opacity:1}
}

/* HEADER */

.header{
margin-bottom:22px;
}

.logo{
font-size:28px;
font-weight:900;
color:var(--rojo);
}

.sub{
font-size:13px;
color:var(--muted);
margin-top:4px;
}

/* INPUT */

input{
width:100%;
padding:16px;
border-radius:16px;
border:1px solid #E5E7EB;
text-align:center;
font-size:16px;
margin-bottom:16px;
transition:.2s;
}

input:focus{
outline:none;
border-color:var(--rojo);
box-shadow:0 0 0 3px rgba(228,0,43,.2);
}

/* BOTONES */

button{
width:100%;
padding:16px;
border:none;
border-radius:16px;
font-size:16px;
font-weight:700;
cursor:pointer;
transition:.25s;
}

button:hover{
transform:translateY(-3px) scale(1.02);
box-shadow:0 18px 40px rgba(0,0,0,.35);
}

/* BOTON BUSCAR */

.btn{
background:linear-gradient(180deg,#FF1744,#C4002A);
color:#fff;
box-shadow:0 12px 25px rgba(228,0,43,.6);
}

/* BOTON ENTRADA */

.btn-entry{
background:linear-gradient(180deg,var(--green),var(--green-dark));
color:#fff;
box-shadow:0 12px 25px rgba(46,125,50,.45);
}

/* BOTON SALIDA */

.btn-exit{
background:linear-gradient(180deg,var(--yellow),var(--yellow-dark));
color:#000;
box-shadow:0 12px 25px rgba(249,168,37,.45);
}

/* TARJETA EMPLEADO */

.info{
background:#F9FAFB;
border-radius:18px;
padding:16px;
margin-bottom:18px;
box-shadow:0 10px 20px rgba(0,0,0,.08);
}

/* FOTO */

.foto{
width:120px;
height:120px;
border-radius:24px;
object-fit:cover;
margin:12px auto;

border:4px solid var(--rojo);

box-shadow:
0 10px 30px rgba(228,0,43,.5),
0 0 20px rgba(228,0,43,.4);
}

/* TEXTO */

h3{
margin:8px 0 4px;
}

p{
margin:0;
}

/* RELOJ */

.reloj{
margin-top:8px;
font-weight:700;
color:var(--text);
}

.fecha{
font-size:14px;
color:var(--muted);
margin-bottom:6px;
}

/* BOTONES BLOQUE */

.botones{
display:flex;
flex-direction:column;
gap:12px;
}

/* MODAL */

.modal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,.45);
backdrop-filter:blur(6px);
justify-content:center;
align-items:center;
z-index:10;
}

/* CONFIRMACION */

.confirm{
background:#fff;
padding:36px;
border-radius:28px;
text-align:center;
width:85%;
max-width:320px;
box-shadow:0 30px 60px rgba(0,0,0,.3);
animation:pop .45s ease;
}

@keyframes pop{
from{opacity:0;transform:scale(.85)}
to{opacity:1}
}

.check{
width:78px;
height:78px;
border-radius:50%;
border:4px solid;
display:flex;
align-items:center;
justify-content:center;
margin:0 auto 16px;
}

.check svg{
width:42px;
height:42px;
fill:none;
stroke-width:4;
stroke-dasharray:100;
stroke-dashoffset:100;
animation:draw .6s ease forwards .2s;
}

@keyframes draw{
to{stroke-dashoffset:0}
}

.confirm.entrada .check,
.confirm.entrada svg{
border-color:var(--green);
stroke:var(--green);
}

.confirm.salida .check,
.confirm.salida svg{
border-color:var(--yellow);
stroke:var(--yellow);
}

/* BADGE */

.badge{
padding:10px 18px;
border-radius:20px;
font-weight:700;
}

.confirm.entrada .badge{
background:var(--green);
color:#fff;
}

.confirm.salida .badge{
background:var(--yellow);
color:#000;
}

/* LOADER */

#loader{
display:none;
position:fixed;
inset:0;
background:rgba(255,255,255,.75);
justify-content:center;
align-items:center;
z-index:20;
}

.spinner{
width:48px;
height:48px;
border-radius:50%;
border:4px solid #ddd;
border-top:4px solid var(--rojo);
animation:spin 1s linear infinite;
}

@keyframes spin{
to{transform:rotate(360deg)}
}

#reader{
width:230px;
}

/* RESPONSIVE */

@media(max-width:480px){
.card{
padding:26px;
}
.logo{
font-size:24px;
}
}

</style>
</head>

<body>

<div id="loader">
<div class="spinner"></div>
</div>

<div id="confirmacion" class="modal">
<div id="confirmBox" class="confirm">

<div class="check">
<svg viewBox="0 0 52 52">
<path d="M14 27 L23 36 L38 16"/>
</svg>
</div>

<div id="badgeTexto" class="badge"></div>

</div>
</div>

<div id="qrModal" class="modal">
<div class="card">

<h3 id="tipoTitulo"></h3>

<div id="reader"></div>

<br>

<button class="btn-exit" onclick="cerrarQR()">Cancelar</button>

</div>
</div>

<div class="card">

<div class="header">
<div class="logo">ADECCO</div>
<div class="sub">Sistema de Control de Asistencia</div>
</div>

<div id="p1">

<input id="dni"
placeholder="Ingrese DNI"
maxlength="8"
inputmode="numeric"
pattern="[0-9]*"
onkeypress="if(event.key==='Enter') buscar()">

<button class="btn" onclick="buscar()">Buscar</button>

</div>

<div id="p2" style="display:none">

<div class="info">

<img id="foto" class="foto">

<h3 id="nombre"></h3>

<p id="cargo" style="color:var(--muted)"></p>

<div class="reloj" id="hora"></div>

<div class="fecha" id="fecha"></div>

</div>

<div class="botones">

<button class="btn-entry" onclick="abrirQR('ENTRADA')">
Registrar Entrada
</button>

<button class="btn-exit" onclick="abrirQR('SALIDA')">
Registrar Salida
</button>

</div>

</div>

</div>

<script>

const API_URL="https://script.google.com/macros/s/AKfycbz2C6m96JXfrZVgzaLODWaPyt5Qg0WHKlsjUYnwF36ZZdi2n38Mq-3wI80qCYoOgnT_/exec";
const QR_VALIDO="RRHH_ASISTENCIA_OK";

let trabajador={},tipoActual="",qr=null,bloqueado=false;

const deviceId=localStorage.getItem("DEVICE_ID")||crypto.randomUUID();
localStorage.setItem("DEVICE_ID",deviceId);

function buscar(){

if(dni.value.length!==8)return;

loader.style.display="flex";

fetch(API_URL,{
method:"POST",
body:new URLSearchParams({
action:"buscar",
dni:dni.value
})
})

.then(r=>r.json())

.then(r=>{

if(!r.ok)return alert(r.mensaje);

trabajador=r.data;

p1.style.display="none";
p2.style.display="block";

nombre.innerText=trabajador.nombre;
cargo.innerText=trabajador.cargo;

foto.src=trabajador.foto||"https://via.placeholder.com/120";

})

.finally(()=>loader.style.display="none");

}

function abrirQR(t){

if(bloqueado)return;

tipoActual=t;

tipoTitulo.innerText="Registrar "+t;

qrModal.style.display="flex";

if(!qr)qr=new Html5Qrcode("reader");

qr.start(
{facingMode:"environment"},
{fps:8,qrbox:200},

txt=>{

if(txt!==QR_VALIDO||bloqueado)return;

bloqueado=true;

cerrarQR();

registrar();

});

}

function cerrarQR(){

qrModal.style.display="none";

qr?.stop().catch(()=>{});

}

function registrar(){

loader.style.display="flex";

navigator.geolocation.getCurrentPosition(p=>{

fetch(API_URL,{
method:"POST",
body:new URLSearchParams({

action:"registrar",
dni:trabajador.dni,
nombre:trabajador.nombre,
cargo:trabajador.cargo,
tipo:tipoActual,
lat:p.coords.latitude,
lng:p.coords.longitude,
deviceId,
qr:QR_VALIDO

})
})

.then(r=>r.json())

.then(r=>{

loader.style.display="none";

mostrarConfirmacion(tipoActual,r.mensaje);

setTimeout(()=>location.reload(),2200);

});

});

}

function mostrarConfirmacion(tipo,msg){

confirmBox.className="confirm "+(tipo==="ENTRADA"?"entrada":"salida");

badgeTexto.innerText=msg;

confirmacion.style.display="flex";

}

function actualizarReloj(){

const f=new Date();

hora.innerText=f.toLocaleTimeString();

fecha.innerText=f.toLocaleDateString("es-PE",{

weekday:"long",
day:"numeric",
month:"long",
year:"numeric"

});

}

setInterval(actualizarReloj,1000);

actualizarReloj();

</script>

</body>
</html>
