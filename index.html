<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Asistencia RRHH</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#E4002B">

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
:root{
--adecco:#E4002B;
--adecco-dark:#B10022;
--green:#27AE60;
--yellow:#F4B400;
--white:#fff;
--text:#222;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
margin:0;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(180deg,#B50027,#8F001F);
padding:20px;
}

body::before{
content:"";
position:absolute;
width:500px;
height:500px;
background:rgba(255,255,255,.08);
border-radius:50%;
top:-180px;
right:-150px;
}

body::after{
content:"";
position:absolute;
width:350px;
height:350px;
background:rgba(255,255,255,.05);
border-radius:50%;
bottom:-140px;
left:-120px;
}

.card{

width:100%;
max-width:430px;

background:#FFFFFF;

border-radius:30px;

padding:35px;

text-align:center;

box-shadow:0 18px 40px rgba(0,0,0,.18);

animation:fadeUp .6s ease;

}

@keyframes subir{

from{
opacity:0;
transform:translateY(40px);
}

to{
opacity:1;
transform:none;
}

}

.logo{

font-size:34px;

font-weight:800;

color:#E4002B;

margin-bottom:30px;

padding-bottom:18px;

border-bottom:2px solid #EFEFEF;

}

input{

width:100%;

padding:18px;

border:none;

border-radius:18px;

background:rgba(255,255,255,.90);

font-size:17px;

text-align:center;

margin-bottom:18px;

transition:.3s;

}

input:focus{

outline:none;

transform:scale(1.02);

box-shadow:0 0 0 4px rgba(255,255,255,.25);

}

button{

width:100%;

padding:18px;

border-radius:16px;

font-size:20px;

font-weight:700;

border:none;

cursor:pointer;

transition:.25s;

}

button:hover{

transform:translateY(-3px);

}

.btn{

background:#fff;

color:#E4002B;

}

.btn-entry{

background:#21B35B;

color:white;

box-shadow:none;

}

.btn-exit{

background:#F4B400;

color:#222;

box-shadow:none;

}

.btn:hover,
.btn-entry:hover,
.btn-exit:hover{

box-shadow:0 15px 30px rgba(0,0,0,.25);

}

.foto{

width:120px;

height:140px;

border-radius:18px;

border:2px solid #E4002B;

object-fit:cover;

box-shadow:0 8px 18px rgba(0,0,0,.15);

margin:15px auto;

}

h3{

font-size:28px;

color:#222;

margin-top:12px;

margin-bottom:8px;

font-weight:700;

}

#cargo{

font-size:17px;

color:#777 !important;

margin-bottom:18px;

}

.reloj{

font-size:42px;

font-weight:700;

color:#222;

margin-top:10px;

}

.fecha{

font-size:18px;

color:#777;

margin-top:8px;

margin-bottom:25px;

}

.modal{

display:none;

position:fixed;

inset:0;

background:rgba(0,0,0,.45);

backdrop-filter:blur(8px);

justify-content:center;

align-items:center;

z-index:100;

}

.confirm{

background:white;

padding:35px;

border-radius:28px;

width:90%;

max-width:330px;

text-align:center;

animation:pop .35s;

}

@keyframes pop{

from{
transform:scale(.8);
opacity:0;
}

to{
transform:scale(1);
opacity:1;
}

}

.check{

width:85px;

height:85px;

border-radius:50%;

display:flex;

justify-content:center;

align-items:center;

margin:auto auto 18px;

border:4px solid;

}

.check svg{

width:42px;

stroke-width:4;

fill:none;

stroke-dasharray:100;

stroke-dashoffset:100;

animation:draw .5s forwards .2s;

}

@keyframes draw{

to{

stroke-dashoffset:0;

}

}

.confirm.entrada .check,
.confirm.entrada svg{

border-color:#27AE60;

stroke:#27AE60;

}

.confirm.salida .check,
.confirm.salida svg{

border-color:#F4B400;

stroke:#F4B400;

}

.badge{

display:inline-block;

padding:12px 24px;

border-radius:25px;

font-weight:bold;

margin-top:10px;

}

.confirm.entrada .badge{

background:#27AE60;

color:white;

}

.confirm.salida .badge{

background:#F4B400;

}

#loader{

display:none;

position:fixed;

inset:0;

background:rgba(255,255,255,.6);

backdrop-filter:blur(4px);

justify-content:center;

align-items:center;

z-index:999;

}

.spinner{

width:55px;

height:55px;

border-radius:50%;

border:5px solid rgba(255,255,255,.3);

border-top:5px solid #E4002B;

animation:spin .8s linear infinite;

}

@keyframes spin{

to{

transform:rotate(360deg);

}

}

#reader{

width:250px;

margin:auto;

border-radius:15px;

overflow:hidden;

}

#installBtn{
    margin-top:10px;
    background:#000;
    color:#fff;
    display:none;
}

/* ===== NUEVO CSS ===== */

.header{
    margin-bottom:25px;
    border-bottom:2px solid #E8E8E8;
    padding-bottom:20px;
}

.logoBox{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:18px;
}

.logoIcon{
    width:70px;
    height:70px;
    background:#E4002B;
    border-radius:16px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:42px;
    font-weight:bold;
    color:white;
}

.logoTitulo{
    margin:0;
    font-size:42px;
    color:#E4002B;
    font-weight:800;
}

.logoSub{
    letter-spacing:2px;
    color:#666;
    font-size:15px;
}

.panel{
    padding:10px;
}

.panel h2{
    margin-bottom:10px;
    color:#333;
}

.texto{
    color:#777;
    margin-bottom:20px;
}

.empleado{
    display:flex;
    align-items:center;
    gap:18px;
    margin-bottom:20px;
    text-align:left;
}

.foto{
    width:120px;
    height:140px;
    border-radius:18px;
    border:3px solid #E4002B;
    object-fit:cover;
    box-shadow:0 8px 18px rgba(0,0,0,.20);
}

.datos h2{
    margin:0;
    font-size:24px;
}

.datos p{
    margin-top:8px;
    color:#666;
}

.relojCard{
    background:#F7F7F7;
    border-radius:18px;
    padding:18px;
    margin-bottom:25px;
}

.reloj{
    font-size:34px;
    font-weight:bold;
    color:#222;
}

.fecha{
    margin-top:8px;
    color:#777;
}

</style>
</head>

<body>

<div id="loader"><div class="spinner"></div></div>

<!-- CONFIRMACION -->
<div id="confirmacion" class="modal">
<div id="confirmBox" class="confirm">
<div class="check">
<svg viewBox="0 0 52 52">
<path d="M14 27 L23 36 L38 16"/>
</svg>
</div>
<div id="badgeTexto" class="badge"></div>
</div>
</div>

<!-- QR -->
<div id="qrModal" class="modal">
<div class="card">
<h3 id="tipoTitulo"></h3>
<div id="reader"></div><br>
<button class="btn-exit" onclick="cerrarQR()">Cancelar</button>
</div>
</div>

<div class="card">

    <!-- ENCABEZADO -->
    <div class="header">
        <div class="logoBox">
            <div class="logoIcon">A</div>
            <div>
                <h1 class="logoTitulo">Adecco</h1>
                <span class="logoSub">ASISTENCIA RRHH</span>
            </div>
        </div>
    </div>

    <!-- PANTALLA 1 -->
    <div id="p1">

        <div class="panel">

            <h2>Ingrese su DNI</h2>

            <p class="texto">
                Identifíquese para registrar su asistencia.
            </p>

            <input
                id="dni"
                maxlength="8"
                placeholder="Ingrese DNI (8 dígitos)"
                onkeypress="if(event.key==='Enter') buscar()">

            <button class="btn" onclick="buscar()">
                🔍 Buscar
            </button>

        </div>

    </div>

    <!-- PANTALLA 2 -->

    <div id="p2" style="display:none;">

        <div class="empleado">

            <img id="foto" class="foto">

            <div class="datos">

                <h2 id="nombre"></h2>

                <p id="cargo"></p>

            </div>

        </div>

        <div class="relojCard">

            <div id="hora" class="reloj"></div>

            <div id="fecha" class="fecha"></div>

        </div>

        <button
            class="btn-entry"
            onclick="abrirQR('ENTRADA')">

            ➜ ENTRADA

        </button>

        <br><br>

        <button
            class="btn-exit"
            onclick="abrirQR('SALIDA')">

            ➜ SALIDA

        </button>

    </div>

    <button id="installBtn">

        Instalar Aplicación

    </button>

</div>

<script>
/* ===== TU LOGICA ORIGINAL ===== */
const API_URL="https://script.google.com/macros/s/AKfycbyChCepZDsskMHQyiA9gEv1bfgi8CCmtTLjexe033l2XR3pbygixgBbJYBZJ5QM44z8/exec";
const QR_VALIDO="RRHH_ASISTENCIA_OK";
let trabajador={},tipoActual="",qr=null,bloqueado=false;

const deviceId=localStorage.getItem("DEVICE_ID")||crypto.randomUUID();
localStorage.setItem("DEVICE_ID",deviceId);

function buscar(){
if(dni.value.length!==8)return;
loader.style.display="flex";

fetch(API_URL,{method:"POST",body:new URLSearchParams({action:"buscar",dni:dni.value})})
.then(r=>r.json())
.then(r=>{
if(!r.ok)return mostrarError(r.mensaje);

trabajador=r.data;
p1.style.display="none";
p2.style.display="block";

nombre.innerText=trabajador.nombre;
cargo.innerText=trabajador.cargo;
foto.src=trabajador.foto||"https://via.placeholder.com/120";
})
.finally(()=>loader.style.display="none");
}

function abrirQR(t){
if(bloqueado)return;

tipoActual=t;
tipoTitulo.innerText="Registrar "+t;
qrModal.style.display="flex";

if(!qr)qr=new Html5Qrcode("reader");

qr.start({facingMode:"environment"},{fps:8,qrbox:200},txt=>{
if(txt!==QR_VALIDO||bloqueado)return;

bloqueado=true;
cerrarQR();
registrar();
});
}

function cerrarQR(){
qrModal.style.display="none";
qr?.stop().catch(()=>{});
}

function registrar(){
loader.style.display="flex";

navigator.geolocation.getCurrentPosition(p=>{
fetch(API_URL,{method:"POST",body:new URLSearchParams({
action:"registrar",
dni:trabajador.dni,
nombre:trabajador.nombre,
cargo:trabajador.cargo,
tipo:tipoActual,
lat:p.coords.latitude,
lng:p.coords.longitude,
deviceId,
qr:QR_VALIDO
})})
.then(r=>r.json())
.then(r=>{
loader.style.display="none";
mostrarConfirmacion(tipoActual,r.mensaje);
setTimeout(()=>location.reload(),2200);
});
});
}

function mostrarConfirmacion(tipo,msg){
confirmBox.className="confirm "+(tipo==="ENTRADA"?"entrada":"salida");
badgeTexto.innerText=msg;
confirmacion.style.display="flex";
}

function actualizarReloj(){
const f=new Date();
hora.innerText=f.toLocaleTimeString();
fecha.innerText=f.toLocaleDateString("es-PE",{weekday:"long",day:"numeric",month:"long",year:"numeric"});
}
setInterval(actualizarReloj,1000);
actualizarReloj();

/* ===== INSTALL PROMPT ===== */
let deferredPrompt;

window.addEventListener("beforeinstallprompt",(e)=>{
e.preventDefault();
deferredPrompt=e;
installBtn.style.display="block";
});

installBtn.addEventListener("click",()=>{
installBtn.style.display="none";
deferredPrompt.prompt();
deferredPrompt.userChoice.then(()=>{
deferredPrompt=null;
});
});
</script>

<!-- SERVICE WORKER -->
<script>
if ("serviceWorker" in navigator) {
navigator.serviceWorker.register("sw.js")
.then(() => console.log("SW registrado"))
.catch(err => console.log("Error SW:", err));
}
</script>

</body>
</html>
