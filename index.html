<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Asistencia RRHH</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#E4002B">

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
/* TODO TU CSS ORIGINAL SIN CAMBIOS */
:root{
--adecco:#E4002B;
--adecco-dark:#B30022;
--green:#2E7D32;
--green-dark:#1B5E20;
--yellow:#F9A825;
--yellow-dark:#F57F17;
--gray:#F4F5F7;
--text:#1F2937;
--muted:#6B7280;
}
*{box-sizing:border-box;font-family:"Segoe UI",system-ui}
body{
margin:0;
min-height:100dvh;
display:flex;
align-items:center;
justify-content:center;
padding:15px;
background:linear-gradient(145deg,#ECEFF1,#CFD8DC);
}

@media(max-width:420px){

body{
padding:15px 10px;
}

.logo{
font-size:24px;
margin-bottom:15px;
}

.credencial{
border-radius:24px;
}

.foto-contenedor{
margin-top:15px;
margin-bottom:10px;
}

.botones{
margin-top:20px;
gap:12px;
}

.reloj{
font-size:26px;
}

.fecha{
font-size:15px;
}

}
.card{
width:100%;
max-width:400px;
padding:24px;
border-radius:28px;
background:#fff;
text-align:center;
box-shadow:0 30px 60px rgba(0,0,0,.25);
animation:fadeUp .6s ease;
margin:auto;
}
@keyframes fadeUp{
from{opacity:0;transform:translateY(30px)}
to{opacity:1}
}
.logo{
font-size:30px;
font-weight:900;
color:var(--adecco);
margin-bottom:20px;
}
input{
width:100%;padding:16px;border-radius:16px;
border:1px solid #E5E7EB;
text-align:center;font-size:16px;
margin-bottom:16px;
}
input:focus{
outline:none;border-color:var(--adecco);
box-shadow:0 0 0 3px rgba(228,0,43,.18);
}
button{
width:100%;padding:16px;border:none;
border-radius:16px;font-size:16px;
font-weight:700;cursor:pointer;
transition:.25s;
}
button:hover{transform:translateY(-2px)}
.btn{
background:linear-gradient(180deg,var(--adecco),var(--adecco-dark));
color:#fff;
box-shadow:0 14px 28px rgba(228,0,43,.45);
}
/* ===========================
   PANTALLA 2 - NUEVO DISEÑO
===========================*/

.credencial{

position:relative;
overflow:hidden;

background:linear-gradient(
160deg,
#52091A 0%,
#8E1530 45%,
#D72645 100%
);

border-radius:28px;

padding:22px 18px;

color:white;

min-height:auto;

}

/* Ondas */

.ondas{
position:absolute;
left:-60px;
top:-40px;
width:220px;
height:750px;
background:
radial-gradient(circle at left,#ffffff 12px,transparent 13px),
linear-gradient(90deg,#ffffff 0,#ffffff 12px,transparent 13px);
opacity:.95;
transform:rotate(8deg);

pointer-events:none;
z-index:1;
}

.ondas::before{
content:"";
position:absolute;
left:20px;
top:-20px;
width:70px;
height:760px;
background:#22060B;
border-radius:100px;
transform:rotate(10deg);
}

.ondas::after{
content:"";
position:absolute;
left:70px;
top:-20px;
width:45px;
height:760px;
background:#48131D;
border-radius:100px;
transform:rotate(10deg);
}

/* Foto */

.foto-contenedor{
display:flex;
justify-content:center;
align-items:center;
margin-top:30px;
margin-bottom:18px;
position:relative;
z-index:5;
background:none;
}

.foto{

width:125px;
height:150px;

border-radius:22px;

object-fit:cover;

border:7px solid white;

background:white;

box-shadow:0 10px 30px rgba(0,0,0,.35);

}

/* Datos */

.datos{

text-align:center;

position:relative;
z-index:5;

}

#nombre{

font-size:24px;

font-weight:800;

margin:0;

color:white;

letter-spacing:.5px;

}

#cargo{

margin-top:6px;

font-size:17px;

font-weight:500;

color:#F4F4F4;

}

.linea{

width:90px;

height:3px;

background:white;

margin:20px auto;

border-radius:20px;

}

.reloj{
font-size:32px;
font-weight:800;
color:#FFFFFF !important;
margin-top:5px;
text-shadow:0 2px 6px rgba(0,0,0,.35);
}

.fecha{
font-size:18px;
margin-top:8px;
color:#FFFFFF !important;
font-weight:500;
text-shadow:0 2px 6px rgba(0,0,0,.35);
}

/* Botones */

.botones{

margin-top:35px;

display:flex;

flex-direction:column;

gap:15px;

}

.btn-entry{

background:#2E7D32;

color:white;

border-radius:16px;

padding:15px;

font-size:15px;

font-weight:bold;

box-shadow:0 10px 25px rgba(0,0,0,.25);

}

.btn-exit{

background:#FBC02D;

color:#111;

border-radius:16px;

padding:15px;

font-size:15px;

font-weight:bold;

box-shadow:0 10px 25px rgba(0,0,0,.25);

}
.modal{
display:none;position:fixed;inset:0;
background:rgba(0,0,0,.45);
backdrop-filter:blur(6px);
justify-content:center;align-items:center;
z-index:10;
}
.confirm{
background:#fff;padding:36px;border-radius:28px;
text-align:center;width:85%;max-width:320px;
box-shadow:0 30px 60px rgba(0,0,0,.3);
animation:pop .45s ease;
}
@keyframes pop{
from{opacity:0;transform:scale(.85)}
to{opacity:1}
}
.check{
width:78px;height:78px;border-radius:50%;
border:4px solid;display:flex;
align-items:center;justify-content:center;
margin:0 auto 16px;
}
.check svg{
width:42px;height:42px;
fill:none;stroke-width:4;
stroke-dasharray:100;
stroke-dashoffset:100;
animation:draw .6s ease forwards .2s;
}
@keyframes draw{to{stroke-dashoffset:0}}
.confirm.entrada .check,
.confirm.entrada svg{
border-color:var(--green);
stroke:var(--green);
}
.confirm.salida .check,
.confirm.salida svg{
border-color:var(--yellow);
stroke:var(--yellow);
}
.badge{
padding:10px 18px;border-radius:20px;
font-weight:700;
}
.confirm.entrada .badge{background:var(--green);color:#fff}
.confirm.salida .badge{background:var(--yellow);color:#000}
/* ERROR */

.confirm.error .check{
border-color:#E53935;
}

.confirm.error svg{
stroke:#E53935;
}

.confirm.error .badge{
background:#E53935;
color:#fff;
}

.confirm.error button{
margin-top:10px;
}
#loader{
display:none;position:fixed;inset:0;
background:rgba(255,255,255,.75);
justify-content:center;align-items:center;
z-index:20;
}
.spinner{
width:48px;height:48px;border-radius:50%;
border:4px solid #ddd;
border-top:4px solid var(--adecco);
animation:spin 1s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
#reader{
width:100%;
max-width:230px;
margin:auto;
}

/* BOTON INSTALAR */
#installBtn{
margin-top:10px;
background:#000;
color:#fff;
display:none;
}
</style>
</head>

<body>

<div id="loader"><div class="spinner"></div></div>

<!-- CONFIRMACION -->
<div id="confirmacion" class="modal">
<div id="confirmBox" class="confirm">
<div class="check">
<svg viewBox="0 0 52 52">
<path d="M14 27 L23 36 L38 16"/>
</svg>
</div>
<div id="badgeTexto" class="badge"></div>
</div>
</div>

<!-- QR -->
<div id="qrModal" class="modal">
<div class="card">
<h3 id="tipoTitulo"></h3>
<div id="reader"></div><br>
<button class="btn-exit" onclick="cerrarQR()">Cancelar</button>
</div>
</div>

<div class="card">
<div class="logo">Asistencia ADECCO</div>

<div id="p1">
<input id="dni" placeholder="Ingrese DNI" maxlength="8" onkeypress="if(event.key==='Enter') buscar()">
<button class="btn" onclick="buscar()">Buscar</button>
</div>

<div id="p2" class="credencial" style="display:none">

<div class="ondas"></div>

<div class="foto-contenedor">
    <img id="foto" class="foto">
</div>

<div class="datos">

<h2 id="nombre"></h2>

<p id="cargo"></p>

<div class="linea"></div>

<div class="reloj" id="hora"></div>

<div class="fecha" id="fecha"></div>

</div>

<div class="botones">

<button class="btn-entry" onclick="abrirQR('ENTRADA')">
🟢 REGISTRAR ENTRADA
</button>

<button class="btn-exit" onclick="abrirQR('SALIDA')">
🟡 REGISTRAR SALIDA
</button>

</div>

</div>

<!-- BOTON INSTALAR -->
<button id="installBtn">Instalar App</button>

</div>

<script>
/* ===== TU LOGICA ORIGINAL ===== */
const API_URL="https://script.google.com/macros/s/AKfycbyzr4uSv3zMeOVtpv_1w5WPEcmmJQ03m9R2lwrRopOoGczLpRobkNi7ZUp8B8SPAI2D/exec";
const QR_VALIDO="RRHH_ASISTENCIA_OK";
let trabajador={},tipoActual="",qr=null,bloqueado=false;

const deviceId=localStorage.getItem("DEVICE_ID")||crypto.randomUUID();
localStorage.setItem("DEVICE_ID",deviceId);

function buscar(){
if(dni.value.length!==8)return;
loader.style.display="flex";

fetch(API_URL,{method:"POST",body:new URLSearchParams({action:"buscar",dni:dni.value})})
.then(r=>r.json())
.then(r=>{
if(!r.ok)return mostrarError(r.mensaje);

trabajador=r.data;
p1.style.display="none";
p2.style.display="block";

nombre.innerText=trabajador.nombre;
cargo.innerText=trabajador.cargo;
foto.src=trabajador.foto||"https://via.placeholder.com/120";
})
.finally(()=>loader.style.display="none");
}

function abrirQR(t){
if(bloqueado)return;

tipoActual=t;
tipoTitulo.innerText="Registrar "+t;
qrModal.style.display="flex";

if(!qr)qr=new Html5Qrcode("reader");

qr.start({facingMode:"environment"},{fps:8,qrbox:200},txt=>{
if(txt!==QR_VALIDO||bloqueado)return;

bloqueado=true;
cerrarQR();
registrar();
});
}

function cerrarQR(){
qrModal.style.display="none";
qr?.stop().catch(()=>{});
}

function registrar() {
    loader.style.display = "flex";

    navigator.geolocation.getCurrentPosition(
        p => {

            fetch(API_URL,{
                method:"POST",
                body:new URLSearchParams({
                    action:"registrar",
                    dni:trabajador.dni,
                    nombre:trabajador.nombre,
                    cargo:trabajador.cargo,
                    tipo:tipoActual,
                    lat:p.coords.latitude,
                    lng:p.coords.longitude,
                    deviceId,
                    qr:QR_VALIDO
                })
            })
            .then(r => r.json())
            .then(r => {
                loader.style.display = "none";

                if(!r.ok){
                    mostrarError(r.mensaje);
                    return;
                }

                mostrarConfirmacion(tipoActual,r.mensaje);
                setTimeout(()=>location.reload(),2200);
            })
            .catch(err=>{
                loader.style.display="none";
                mostrarError("Error de conexión.");
                console.error(err);
            });

        },
        err=>{
            loader.style.display="none";
            mostrarError("No se pudo obtener la ubicación.");
            console.error(err);
        }
    );
}

function mostrarConfirmacion(tipo, msg) {
    confirmBox.className = "confirm " + (tipo === "ENTRADA" ? "entrada" : "salida");
    document.getElementById("badgeTexto").innerText = msg;
    confirmacion.style.display = "flex";

    if ("speechSynthesis" in window) {
        speechSynthesis.cancel();

        let texto;

        if (tipo === "ENTRADA") {
            texto = `Bienvenido ${trabajador.nombre}. ${msg}`;
        } else {
            texto = `Hasta luego ${trabajador.nombre}. ${msg}`;
        }

        const voz = new SpeechSynthesisUtterance(texto);
        voz.lang = "es-PE";
        voz.rate = 1;
        voz.pitch = 1;
        voz.volume = 1;

        speechSynthesis.speak(voz);
    }
}

/* ======= AGREGA ESTO ======= */
function mostrarError(mensaje){

    loader.style.display="none";

    confirmBox.className="confirm error";

    confirmBox.innerHTML=`

        <div class="check">
            <svg viewBox="0 0 52 52">
                <path d="M16 16 L36 36 M36 16 L16 36"/>
            </svg>
        </div>

        <div class="badge">
            ERROR
        </div>

        <h3 style="margin:18px 0 10px;font-size:22px;">
            Atención
        </h3>

        <p style="font-size:17px;margin-bottom:22px;">
            ${mensaje}
        </p>

        <button class="btn" onclick="cerrarMensaje()">
            ACEPTAR
        </button>

    `;

    confirmacion.style.display="flex";
}


function cerrarMensaje(){

    confirmacion.style.display="none";

    confirmBox.className="confirm";

    confirmBox.innerHTML=`

        <div class="check">
            <svg viewBox="0 0 52 52">
                <path d="M14 27 L23 36 L38 16"/>
            </svg>
        </div>

        <div id="badgeTexto" class="badge"></div>

    `;
}
/* =========================== */

function actualizarReloj(){
    const f=new Date();
    hora.innerText=f.toLocaleTimeString();
    fecha.innerText=f.toLocaleDateString("es-PE",{weekday:"long",day:"numeric",month:"long",year:"numeric"});
}
setInterval(actualizarReloj,1000);
actualizarReloj();

/* ===== INSTALL PROMPT ===== */
let deferredPrompt;

window.addEventListener("beforeinstallprompt",(e)=>{
e.preventDefault();
deferredPrompt=e;
installBtn.style.display="block";
});

installBtn.addEventListener("click",()=>{
installBtn.style.display="none";
deferredPrompt.prompt();
deferredPrompt.userChoice.then(()=>{
deferredPrompt=null;
});
});
</script>

<!-- SERVICE WORKER -->
<script>
if ("serviceWorker" in navigator) {
navigator.serviceWorker.register("sw.js")
.then(() => console.log("SW registrado"))
.catch(err => console.log("Error SW:", err));
}
</script>

</body>
</html>
